{% if config.copyright %}
  <div class="md-copyright">
    {% if config.copyright %}
      <div class="md-copyright__highlight">
        {{ config.copyright }}
      </div>
    {% endif %}
    {% if not config.extra.generator == false %}
      Made with
      <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank" rel="noopener">
        Material for MkDocs
      </a>
    {% endif %}
  </div>
{% endif %}
{% if config.extra.version is defined %}
  <div class="md-copyright" style="opacity: 0.6; font-size: 0.7rem;">
    v{{ config.extra.version }}
  </div>
{% endif %}
