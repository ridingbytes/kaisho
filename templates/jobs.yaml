jobs:
- id: daily-briefing
  name: Daily Briefing
  schedule: "30 8 * * 1-5"
  model: kaisho:cron
  prompt_file: prompts/daily-briefing.md
  output: inbox
  timeout: 600
  enabled: false
  inject_context: true
  description: >-
    A morning briefing summarising open tasks, this week's
    hours, billable rate, customer budget alerts, and quick
    wins. Suggests 2-3 priorities for today.
  category: briefing
  requires_tools: false

- id: weekly-project-update
  name: Project Status
  schedule: "0 17 * * 5"
  model: kaisho:cron
  prompt_file: prompts/project-update.md
  output: inbox
  timeout: 600
  enabled: false
  inject_context: true
  description: >-
    Weekly per-customer status report. Budget consumption,
    task progress by status, billable utilisation, and a
    one-line recommendation for next week.
  category: report
  requires_tools: false

- id: weekly-summary
  name: Week in Review
  schedule: "0 17 * * 5"
  model: kaisho:cron
  prompt_file: prompts/weekly-summary.md
  output: inbox
  timeout: 600
  enabled: false
  inject_context: true
  description: >-
    Compact weekly recap: hours by customer, daily breakdown,
    busiest day, billable split, and any budget alerts. Goes
    to inbox as a record of what shipped that week.
  category: report
  requires_tools: false

- id: hn-ai-daily
  name: HN AI Digest
  schedule: "30 21 * * *"
  model: kaisho:cron
  prompt_file: prompts/hn-ai-daily.md
  output: inbox
  timeout: 600
  enabled: false
  inject_context: false
  description: >-
    Daily AI-focused digest of Hacker News stories. Pulls
    the latest 100 stories via the HN Algolia API, filters
    for AI/ML/LLM topics, and produces a 5-8 item summary.
    Does not need Kaisho task/customer context.
  category: news
  requires_tools: false

- id: weekly-scout
  name: Business Scout
  schedule: "0 9 * * 1"
  model: kaisho:cron
  prompt_file: prompts/weekly-scout.md
  output: inbox
  timeout: 900
  enabled: false
  inject_context: false
  description: >-
    Weekly competitive intelligence scan across YouTube,
    Hacker News, GitHub, and PyPI for opportunities and
    competitor moves. Customise the placeholders in the
    prompt before running. Requires a tool-capable model.
  category: research
  requires_tools: true
