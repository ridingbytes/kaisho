jobs:
- id: daily-briefing
  name: Daily Briefing
  schedule: "30 8 * * 1-5"
  model: kaisho:cron
  prompt_file: prompts/daily-briefing.md
  output: inbox
  timeout: 600
  enabled: false

- id: weekly-project-update
  name: Project Status
  schedule: "0 17 * * 5"
  model: kaisho:cron
  prompt_file: prompts/project-update.md
  output: inbox
  timeout: 600
  enabled: false

- id: weekly-summary
  name: Week in Review
  schedule: "0 17 * * 5"
  model: kaisho:cron
  prompt_file: prompts/weekly-summary.md
  output: inbox
  timeout: 600
  enabled: false
