<!doctype html>
<html lang="en" style="overflow:hidden;background:transparent">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaisho Tray</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="overflow:hidden;margin:0;background:transparent">
    <script>
      // Apply persisted theme and keep it in sync
      (function(){
        function apply(){
          var t=localStorage.getItem("theme");
          if(t==="dark")document.documentElement.dataset.theme="dark";
          else delete document.documentElement.dataset.theme;
        }
        apply();
        window.addEventListener("storage",apply);
        document.addEventListener("visibilitychange",apply);
      })()
    </script>
    <div id="tray-root"></div>
    <script type="module" src="/src/tray/main.tsx"></script>
  </body>
</html>
