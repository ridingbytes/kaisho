name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - develop

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_script: pwsh scripts/build-sidecar.ps1

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Python deps
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Install desktop deps
        run: cd desktop && pnpm install

      - name: Build sidecar
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ${{ matrix.sidecar_script }} "$BUILD_TARGET"

      - name: Ad-hoc sign sidecar (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          find desktop/src-tauri/binaries -type f \
            -name "kai-server-*" \
            -exec codesign --force --sign - {} \;

      - name: Determine release channel
        id: channel
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          if [[ "$TAG_NAME" == *"-dev"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_CHANNEL" == "develop" ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain
          rm /tmp/cert.p12

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: "Kaisho v__VERSION__"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: ${{ steps.channel.outputs.prerelease }}
          args: --target ${{ matrix.target }}

      - name: Collect updater signatures
        id: sigs
        shell: bash
        run: |
          mkdir -p /tmp/updater-sigs
          find desktop/src-tauri/target -name "*.sig" \
            -not -path "*/deps/*" \
            -exec cp {} /tmp/updater-sigs/ \;
          echo "Collected signatures:"
          ls -la /tmp/updater-sigs/

      - name: Upload signatures artifact
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.target }}
          path: /tmp/updater-sigs/*.sig
          if-no-files-found: warn

  updater-json:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: sigs-*
          merge-multiple: true

      - name: List signatures
        run: ls -la sigs/ 2>/dev/null || echo "No sigs"

      - name: Build and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export VERSION="${TAG#v}"
          export PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Read signature files
          read_sig() {
            local f=$(find sigs/ -name "$1" 2>/dev/null | head -1)
            if [ -n "$f" ] && [ -f "$f" ]; then
              cat "$f"
            fi
          }

          export MAC_SIG=$(read_sig "*.app.tar.gz.sig")
          export LINUX_SIG=$(read_sig "*AppImage.tar.gz.sig")
          export WIN_SIG=$(read_sig "*setup.nsis.zip.sig")

          # Get release asset names
          ASSETS=$(gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json assets -q '.assets[].name')

          export MAC_TAR=$(echo "$ASSETS" \
            | grep "app.tar.gz" | head -1)
          export LINUX_AI=$(echo "$ASSETS" \
            | grep "AppImage$" | head -1)
          export WIN_EXE=$(echo "$ASSETS" \
            | grep "setup.exe" | head -1)

          # Build JSON with python for safety
          python3 << 'PYEOF'
          import json, os
          platforms = {}
          mac_sig = os.environ.get("MAC_SIG", "")
          linux_sig = os.environ.get("LINUX_SIG", "")
          win_sig = os.environ.get("WIN_SIG", "")
          base = os.environ["BASE"]
          mac_tar = os.environ.get("MAC_TAR", "")
          linux_ai = os.environ.get("LINUX_AI", "")
          win_exe = os.environ.get("WIN_EXE", "")

          if mac_sig and mac_tar:
              platforms["darwin-aarch64"] = {
                  "signature": mac_sig,
                  "url": f"{base}/{mac_tar}",
              }
          if linux_sig and linux_ai:
              platforms["linux-x86_64"] = {
                  "signature": linux_sig,
                  "url": f"{base}/{linux_ai}",
              }
          if win_sig and win_exe:
              platforms["windows-x86_64"] = {
                  "signature": win_sig,
                  "url": f"{base}/{win_exe}",
              }

          data = {
              "version": os.environ["VERSION"],
              "pub_date": os.environ["PUB_DATE"],
              "platforms": platforms,
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PYEOF

          gh release upload "$TAG" latest.json \
            --repo "${{ github.repository }}" \
            --clobber
