name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_script: pwsh scripts/build-sidecar.ps1

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Python deps
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Install desktop deps
        run: cd desktop && pnpm install

      - name: Build sidecar
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ${{ matrix.sidecar_script }} "$BUILD_TARGET"

      - name: Ad-hoc sign sidecar (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          find desktop/src-tauri/binaries -type f \
            -name "kai-server-*" \
            -exec codesign --force --sign - {} \;

      - name: Import Apple certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain
          rm /tmp/cert.p12

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cd desktop && npx tauri build --target ${{ matrix.target }}

      - name: Create updater bundle (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          APP_DIR=$(find "$PWD/desktop/src-tauri/target" \
            -path "*/bundle/macos/*.app" -maxdepth 6 \
            | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "No .app found"; exit 1
          fi
          TARBALL="${APP_DIR}.tar.gz"
          echo "Creating $TARBALL"
          tar czf "$TARBALL" \
            -C "$(dirname "$APP_DIR")" \
            "$(basename "$APP_DIR")"
          npx --prefix desktop tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TARBALL"
          ls -la "$TARBALL" "${TARBALL}.sig"

      - name: Create updater bundle (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          AI=$(find "$PWD/desktop/src-tauri/target" \
            -path "*/bundle/appimage/*.AppImage" \
            -maxdepth 6 | head -1)
          if [ -z "$AI" ]; then
            echo "No AppImage found"; exit 0
          fi
          TARBALL="${AI}.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            echo "Creating $TARBALL"
            tar czf "$TARBALL" \
              -C "$(dirname "$AI")" \
              "$(basename "$AI")"
          fi
          if [ ! -f "${TARBALL}.sig" ]; then
            npx --prefix desktop tauri signer sign \
              -k "$TAURI_SIGNING_PRIVATE_KEY" \
              -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "$TARBALL"
          fi

      - name: Sign NSIS installer (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          EXE=$(find "$PWD/desktop/src-tauri/target" \
            -path "*/bundle/nsis/*-setup.exe" \
            -maxdepth 6 | head -1)
          if [ -z "$EXE" ]; then
            echo "No NSIS exe found"; exit 0
          fi
          echo "Signing $EXE"
          npx --prefix desktop tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$EXE"
          ls -la "$EXE" "${EXE}.sig"

      - name: Collect build artifacts
        id: collect
        shell: bash
        run: |
          mkdir -p ${RUNNER_TEMP}/release
          find desktop/src-tauri/target \
            -path "*/bundle/*" \
            \( -name "*.dmg" \
            -o -name "*.app.tar.gz" \
            -o -name "*.app.tar.gz.sig" \
            -o -name "*.deb" \
            -o -name "*.rpm" \
            -o -name "*.AppImage" \
            -o -name "*.AppImage.tar.gz" \
            -o -name "*.AppImage.tar.gz.sig" \
            -o -name "*.msi" \
            -o -name "*.msi.zip" \
            -o -name "*.msi.zip.sig" \
            -o -name "*-setup.exe" \
            -o -name "*-setup.exe.sig" \
            \) \
            -not -path "*/deps/*" \
            -exec cp -v {} ${RUNNER_TEMP}/release/ \;
          echo "Collected:"
          ls -la ${RUNNER_TEMP}/release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ runner.temp }}/release/

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Create draft release
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Kaisho v${VERSION}" \
            --notes "See CHANGELOG.md for details." \
            --draft

          # Upload all non-sig artifacts
          for f in artifacts/*; do
            name=$(basename "$f")
            case "$name" in *.sig) continue ;; esac
            echo "Uploading $name"
            gh release upload "$TAG" "$f" \
              --repo "${{ github.repository }}"
          done

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export VERSION="${TAG#v}"
          export PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          read_sig() {
            local f=$(find artifacts/ -name "$1" \
              2>/dev/null | head -1)
            if [ -n "$f" ] && [ -f "$f" ]; then
              cat "$f"
            fi
          }

          export MAC_SIG=$(read_sig "*.app.tar.gz.sig")
          export LINUX_SIG=$(read_sig \
            "*AppImage.tar.gz.sig")
          export WIN_SIG=$(read_sig \
            "*setup.exe.sig")

          # Find asset names from uploaded files
          export MAC_TAR=$(ls artifacts/ \
            | grep "app.tar.gz$" | head -1)
          export LINUX_AI=$(ls artifacts/ \
            | grep "AppImage$" | head -1)
          export WIN_EXE=$(ls artifacts/ \
            | grep "setup.exe$" | head -1)

          python3 << 'PYEOF'
          import json, os
          platforms = {}
          base = os.environ["BASE"]

          for key, sig_var, file_var in [
              ("darwin-aarch64", "MAC_SIG", "MAC_TAR"),
              ("linux-x86_64", "LINUX_SIG", "LINUX_AI"),
              ("windows-x86_64", "WIN_SIG", "WIN_EXE"),
          ]:
              sig = os.environ.get(sig_var, "")
              fname = os.environ.get(file_var, "")
              if sig and fname:
                  platforms[key] = {
                      "signature": sig,
                      "url": f"{base}/{fname}",
                  }

          data = {
              "version": os.environ["VERSION"],
              "pub_date": os.environ["PUB_DATE"],
              "platforms": platforms,
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PYEOF

          gh release upload "$TAG" latest.json \
            --repo "${{ github.repository }}" \
            --clobber
