name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - develop

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: macos-13
            target: x86_64-apple-darwin
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_script: pwsh scripts/build-sidecar.ps1

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Python deps
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Install desktop deps
        run: cd desktop && pnpm install

      - name: Build sidecar
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ${{ matrix.sidecar_script }} "$BUILD_TARGET"

      - name: Determine release channel
        id: channel
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          if [[ "$TAG_NAME" == *"-dev"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=develop" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_CHANNEL" == "develop" ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=develop" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: "Kaisho v__VERSION__"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: ${{ steps.channel.outputs.prerelease }}
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}
