name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - develop

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_script: bash scripts/build-sidecar.sh
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_script: pwsh scripts/build-sidecar.ps1

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Python deps
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Install desktop deps
        run: cd desktop && pnpm install

      - name: Build sidecar
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ${{ matrix.sidecar_script }} "$BUILD_TARGET"

      - name: Ad-hoc sign sidecar (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          find desktop/src-tauri/binaries -type f \
            -name "kai-server-*" \
            -exec codesign --force --sign - {} \;

      - name: Determine release channel
        id: channel
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          if [[ "$TAG_NAME" == *"-dev"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=develop" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_CHANNEL" == "develop" ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=develop" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain
          rm /tmp/cert.p12

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: "Kaisho v__VERSION__"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: ${{ steps.channel.outputs.prerelease }}
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      - name: Upload sig files
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          find desktop/src-tauri/target -name "*.sig" \
            -not -path "*/deps/*" | while read sig; do
            name=$(basename "$sig")
            echo "Uploading $name"
            gh release upload "$TAG" "$sig" \
              --clobber 2>/dev/null || true
          done

  updater-json:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Download sig files
          mkdir -p /tmp/sigs
          gh release download "$TAG" \
            --pattern "*.sig" \
            --dir /tmp/sigs 2>/dev/null || true

          read_sig() {
            local pattern="$1"
            local f=$(find /tmp/sigs -name "$pattern" | head -1)
            if [ -n "$f" ]; then cat "$f"; else echo ""; fi
          }

          MAC_SIG=$(read_sig "*.app.tar.gz.sig")
          LINUX_SIG=$(read_sig "*AppImage.tar.gz.sig")
          WIN_NSIS_SIG=$(read_sig "*setup.nsis.zip.sig")
          WIN_MSI_SIG=$(read_sig "*x64_en-US.msi.sig")

          # Find actual asset names
          ASSETS=$(gh release view "$TAG" \
            --json assets -q '.assets[].name')
          MAC_TAR=$(echo "$ASSETS" | grep "app.tar.gz" | head -1)
          LINUX_IMG=$(echo "$ASSETS" | grep "AppImage" | grep -v sig | head -1)
          WIN_NSIS=$(echo "$ASSETS" | grep "setup.exe" | grep -v sig | head -1)

          cat > /tmp/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${RELEASE_URL}/${MAC_TAR}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${RELEASE_URL}/${LINUX_IMG}"
              },
              "windows-x86_64": {
                "signature": "${WIN_NSIS_SIG}",
                "url": "${RELEASE_URL}/${WIN_NSIS}"
              }
            }
          }
          ENDJSON

          # Clean up indentation
          python3 -c "
          import json, sys
          with open('/tmp/latest.json') as f:
              data = json.load(f)
          # Remove platforms with empty signatures
          data['platforms'] = {
              k: v for k, v in data['platforms'].items()
              if v.get('signature')
          }
          with open('/tmp/latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          echo "Generated latest.json:"
          cat /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json \
            --clobber
