name: Deploy Documentation

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mkdocs>=1.6 mkdocs-material>=9.5 mkdocs-minify-plugin>=0.8

      - name: Build and deploy
        run: mkdocs gh-deploy --force
